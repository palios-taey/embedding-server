# NGINX Load Balancer for Qwen3-Embedding-8B
# CONFIG v5: Spark 1+2 only (Feb 28, 2026) - Spark 3/4 reassigned to OpenClaw/PALIOS
# Total: 4 instances across 2 nodes

upstream embedding_servers {
    zone embedding_zone 64k;  # CRITICAL: Shared state across NGINX workers
    least_conn;               # Works correctly with zone directive

    # Spark 1 (10.0.0.68, spark-78c6) - 2 instances
    server 10.0.0.68:8081;
    server 10.0.0.68:8082;

    # Spark 2 (10.0.0.80, spark-155d) - 2 instances
    server 10.0.0.80:8081;
    server 10.0.0.80:8082;

    # Spark 3+4 removed — dedicated to OpenClaw/PALIOS (MiniMax M2.5)

    keepalive 16;             # 4 per backend
    keepalive_requests 100;   # Force connection rotation after 100 requests
}

server {
    listen 8090;
    server_name _;

    location /health {
        proxy_pass http://embedding_servers/health;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    location /embed {
        proxy_pass http://embedding_servers/embed;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_read_timeout 300s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 300s;
    }

    location / {
        proxy_pass http://embedding_servers/;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }
}
