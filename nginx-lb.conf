# NGINX Load Balancer for Qwen3-Embedding-8B
# OPTIMIZED CONFIG v2 per Grok + Perplexity Analysis (Dec 15, 2025)
# Changes: Added zone for shared worker state, keepalive_requests for rotation

upstream embedding_servers {
    zone embedding_zone 64k;  # CRITICAL: Shared state across NGINX workers
    least_conn;               # Now works correctly with zone directive

    # Spark 1 instances (10.0.0.68) - 2 instances
    server 10.0.0.68:8081;
    server 10.0.0.68:8082;

    # Spark 2 instances (10.0.0.80) - 2 instances
    server 10.0.0.80:8081;
    server 10.0.0.80:8082;

    keepalive 32;             # Reduced from 64 (middle ground)
    keepalive_requests 100;   # Force connection rotation after 100 requests
}

server {
    listen 8090;
    server_name _;

    location /health {
        proxy_pass http://embedding_servers/health;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    location /embed {
        proxy_pass http://embedding_servers/embed;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_read_timeout 300s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 300s;
    }

    location / {
        proxy_pass http://embedding_servers/;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }
}
